name: 'Bug report'
description: Something is not working as expected
title: '[bug] <short summary>'
labels: ['type: bug']
body:
    - type: textarea
      id: what
      attributes:
          label: What happened?
          description: Clear and concise description of the problem.
          placeholder: Describe the issue in detail.
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: Step-by-step instructions to reproduce the problem.
          value: |
              1. Go to …
              2. Click …
              3. Observe …
      validations:
          required: true

    - type: input
      id: expected
      attributes:
          label: Expected behavior
          description: What did you expect to happen?
          placeholder: The application should …

    - type: input
      id: actual
      attributes:
          label: Actual behavior
          description: What actually happened?
          placeholder: Instead, it …

    - type: textarea
      id: extra
      attributes:
          label: Screenshots / Logs
          description: Add any relevant images, error traces, or console output.
          placeholder: |
              Paste logs here or drag screenshots.
          render: shell
