- name: 'type: bug'
  color: 'd73a4a'
  description: 'Something is not working properly'

- name: 'type: feature'
  color: 'a2eeef'
  description: 'New functionality or major addition'

- name: 'type: improvement'
  color: '1d76db'
  description: 'Enhancement to existing functionality'

- name: 'type: documentation'
  color: '0075ca'
  description: 'Changes or additions to documentation'

- name: 'type: refactor'
  color: 'c5def5'
  description: 'Code restructuring without behavior change'

- name: 'type: research'
  color: 'cfd3d7'
  description: 'R&D, prototype, or exploration task'

- name: 'priority: high'
  color: 'b60205'
  description: 'Critical issue; affects release or users'

- name: 'priority: medium'
  color: 'd93f0b'
  description: 'Important but not blocking release'

- name: 'priority: low'
  color: 'lightgray'
  description: 'Nice to have; not urgent'

- name: 'help wanted'
  color: '008672'
  description: 'Needs advice, mentoring, or extra hands'

- name: 'question'
  color: 'd876e3'
  description: 'Clarification or discussion needed'

- name: 'duplicate'
  color: 'cfd3d7'
  description: 'This issue or PR already exists'

- name: 'invalid'
  color: 'e4e669'
  description: 'Not enough info or incorrectly described'

- name: 'wontfix'
  color: 'ffffff'
  description: 'Decided not to fix or implement'

- name: 'blocked'
  color: '000000'
  description: 'Blocked by external dependency or another task'

- name: 'status: in progress'
  color: '0366d6'
  description: 'Currently being worked on'

- name: 'status: review'
  color: 'fbca04'
  description: 'Awaiting code review'

- name: 'status: ready for release'
  color: '0e8a16'
  description: 'Ready to include in the next release'
